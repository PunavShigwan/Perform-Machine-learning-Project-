{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}PERFORM — AI Personal Trainer{% endblock %}</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">

  <link rel="icon" type="image/png" href="{% static 'frontend/images/favicon.png' %}">
  <link rel="stylesheet" href="{% static 'frontend/style.css' %}">
</head>

<body>

  <!-- Modern Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">
        <a href="{% url 'frontend:home' %}">PERFORM</a>
      </div>

      <nav class="nav-links">
        <a href="{% url 'frontend:home' %}">Home</a>
        <a href="{% url 'frontend:exercises' %}">Exercises</a>
        <a href="{% url 'frontend:pushup' %}">Push-up</a>
        <a href="{% url 'frontend:squat' %}">Squat</a>
        <a href="{% url 'frontend:clean_and_jerk' %}">Clean & Jerk</a>
        <a href="{% url 'frontend:dips' %}">Dips</a>
      </nav>
    </div>
  </header>

  <main class="main-container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Major Project Group 21</p>
    <p>© {% now "Y" %} PERFORM AI</p>
  </footer>

  <script>
    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('.navbar');
      if (window.scrollY > 20) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });

    // Mesh background mouse follow effect
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty('--x', x + '%');
      document.body.style.setProperty('--y', y + '%');
    });
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
